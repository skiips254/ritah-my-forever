<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret 💖</title>
<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
</style>
</head>
<body>

<div class="box">
    <h1>💖 Enter Password</h1>
    <p style="font-size: 22px; color: white; margin-top: 0;">Only for my love</p>

    <input type="password" id="pass" placeholder="Enter code" onkeydown="handleKeyPress(event)">
    <br>
    <button onclick="check()">Enter 💌</button>

    <div class="error" id="error"></div>
</div>

<script>
// Reset music state whenever returning to login screen
localStorage.setItem("musicPlaying", "false");

function check() {
    if (document.getElementById("pass").value === "2120") {
        window.location.href = "page1.html";
    } else {
        document.getElementById("error").innerText = "Wrong password 💔";
    }
}

function handleKeyPress(event) {
    if (event.key === "Enter") {
        check();
    }
}
</script>

</body>
</html>
