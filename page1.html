<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alvin ❤️ Ritah</title>
<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body class="page1">

<!-- 🎵 MUSIC TOGGLE BRIDGE -->
<button class="music-control" onclick="toggleMusic()">
    <span id="music-icon">🎵</span> <span id="music-text">Play Our Song</span>
</button>
<audio id="bg-music" loop>
    <source src="our-song.mp3" type="audio/mpeg">
</audio>

<!-- ❤️ FLOATING HEARTS BACKGROUND -->
<div class="hearts">
    <span>❤️</span>
    <span>💖</span>
    <span>💕</span>
    <span>💗</span>
    <span>💘</span>
    <span>💞</span>
</div>

<!-- 💖 CONTENT CONTAINER -->
<div class="container">
    <h1>Welcome, my love 💕</h1>
    <h2>I LOVE YOU BABE</h2>
    <p id="intro-text"></p>
    <button onclick="goNext()">Open my heart 💌</button>
</div>

<!-- 🌑 TRANSITION OVERLAY -->
<div class="transition-overlay" id="overlay"></div>

<script>
const audio = document.getElementById("bg-music");

// Track timestamp dynamically
audio.addEventListener("timeupdate", () => {
    localStorage.setItem("musicTimestamp", audio.currentTime);
});

// Sync both state and exact timestamp
if (localStorage.getItem("musicPlaying") === "true") {
    const savedTime = localStorage.getItem("musicTimestamp");
    if (savedTime) { audio.currentTime = parseFloat(savedTime); }
    audio.play().catch(() => {});
    document.getElementById("music-icon").innerText = "⏸️";
    document.getElementById("music-text").innerText = "Pause Music";
}

function toggleMusic() {
    if (audio.paused) {
        audio.play();
        localStorage.setItem("musicPlaying", "true");
        document.getElementById("music-icon").innerText = "⏸️";
        document.getElementById("music-text").innerText = "Pause Music";
    } else {
        audio.pause();
        localStorage.setItem("musicPlaying", "false");
        document.getElementById("music-icon").innerText = "🎵";
        document.getElementById("music-text").innerText = "Play Our Song";
    }
}

const text = "I created this little space just for you—a place where my heart speaks only for you 💖";
let i = 0;

function type() {
    if (i < text.length) {
        document.getElementById("intro-text").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 40);
    }
}

window.addEventListener("load", () => {
    type();
});

function goNext() {
    // Save state instantly at point of execution
    localStorage.setItem("musicTimestamp", audio.currentTime);
    const overlay = document.getElementById("overlay");
    overlay.classList.add("active");

    setTimeout(() => {
        window.location.href = "page2.html";
    }, 900);
}
</script>

</body>
</html>
